services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      GOOGLE_SERVICE_ACCOUNT_FILE: /app/secrets/service-account.json
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - cache_data:/app/data/cache
      - ./rejects-analyze-8436e6cbcd85.json:/app/secrets/service-account.json:ro
    depends_on:
      qdrant:
        condition: service_started

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        VITE_BACKEND_URL: http://localhost:8000
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  cache_data:
  qdrant_data:
